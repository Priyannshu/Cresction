name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/**/package-lock.json

      - name: Lint frontend
        run: |
          cd frontend
          npm ci
          npm run lint --if-present

      - name: Test frontend build
        run: |
          cd frontend
          npm run build

      - name: Lint backend services
        run: |
          for service in backend/*; do
            if [ -f "$service/package.json" ]; then
              echo "Linting $service"
              (cd $service && npm ci && npm run lint --if-present) || exit 1
            fi
          done

      - name: Test backend services (unit tests)
        run: |
          for service in backend/*; do
            if [ -f "$service/package.json" ]; then
              echo "Testing $service"
              (cd $service && npm test --if-present) || echo "Tests failed or not configured"
            fi
          done

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/user-service
          file: ./backend/user-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/user-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/user-service:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push product-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/product-service
          file: ./backend/product-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/product-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/product-service:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push cart-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/cart-service
          file: ./backend/cart-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cart-service:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/cart-service:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api-gateway
          file: ./backend/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-staging:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploy to staging environment (placeholder)"
          # Add deployment steps for staging (e.g., kubectl, helm, etc.)

  deploy-production:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        run: |
          echo "Deploy to production environment (placeholder)"
          # Add deployment steps for production