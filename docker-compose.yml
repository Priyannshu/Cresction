version: '3.8'

services:
  # Databases
  postgres:
    image: postgres:15-alpine
    container_name: cresction-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cresction
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cresction-network

  redis:
    image: redis:7-alpine
    container_name: cresction-redis
    ports:
      - "6379:6379"
    networks:
      - cresction-network

  # API Gateway
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: cresction-api-gateway
    environment:
      NODE_ENV: development
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      JWT_SECRET: your_jwt_secret_key_change_in_production
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      - user-service
      - product-service
      - cart-service
      - redis
    networks:
      - cresction-network

  # Microservices
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: cresction-user-service
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cresction?schema=public
      JWT_SECRET: your_jwt_secret_key_change_in_production
      JWT_EXPIRES_IN: 7d
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - cresction-network

  product-service:
    build:
      context: ./backend/product-service
      dockerfile: Dockerfile
    container_name: cresction-product-service
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cresction?schema=public
    depends_on:
      - postgres
    networks:
      - cresction-network

  cart-service:
    build:
      context: ./backend/cart-service
      dockerfile: Dockerfile
    container_name: cresction-cart-service
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cresction?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - cresction-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cresction-frontend
    ports:
      - "3001:80"
    depends_on:
      - api-gateway
    networks:
      - cresction-network

volumes:
  postgres_data:

networks:
  cresction-network:
    driver: bridge
