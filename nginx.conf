server {
    listen 80;
    listen [::]:80;
    server_name getn.space www.getn.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name getn.space www.getn.space;

    ssl_certificate /etc/letsencrypt/live/getn.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getn.space/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Products
    location /api/products/ {
        proxy_pass http://127.0.0.1:3002/api/products/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /api/categories/ {
        proxy_pass http://127.0.0.1:3002/api/categories/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_set_header Host $host;
    }

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Static
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3001;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}